[target.wasm32-unknown-unknown]
rustflags = [
  # Grow the Wasm stack from the linker default (1 MiB) to 8 MiB. Rust
  # targeting wasm32 uses noticeably more stack per frame than native
  # x86_64; BDD apply recursion can reach several hundred levels deep
  # on larger workloads. 8 MiB is generous and well within our 4 GiB
  # memory budget.
  "-C", "link-arg=-zstack-size=8388608",
  # 4 GiB = the wasm32 ceiling. The multiplication relation at k=14
  # is ~4M final nodes × 16 B ≈ 60 MiB, but peak during bitblasting
  # plus accumulated slot-table growth pushes a sequential k=7..14
  # sweep past 1 GiB. Giving 4 GiB lets the sweep finish cleanly.
  "-C", "link-arg=--max-memory=4294967296",
  "-C", "link-arg=--import-memory",
]
