[target.wasm32-unknown-unknown]
rustflags = [
  "-C", "target-feature=+atomics,+bulk-memory,+mutable-globals",
  "-C", "link-arg=--import-memory",
  "-C", "link-arg=--shared-memory",
  # 4 GiB = the wasm32 ceiling. The multiplication relation at k=14
  # is ~10M final nodes, with peak ~5× that during bitblasting; at
  # 16 B per node the slot table alone can need 800 MiB, above a
  # 1 GiB cap after stacks and apply cache are accounted for.
  "-C", "link-arg=--max-memory=4294967296",
  "-C", "link-arg=--export=__wasm_init_tls",
  "-C", "link-arg=--export=__tls_size",
  "-C", "link-arg=--export=__tls_align",
  "-C", "link-arg=--export=__tls_base",
  # WASM's default stack is 1 MiB. Rust targeting WASM typically uses
  # 5-10x more stack per frame than native due to the linear-memory
  # calling convention. Native tests confirm our worst-case recursion
  # (k=10 multiplication relation build + drop) fits in 128 KiB on
  # native; conservatively giving 8 MiB per worker handles any 60×
  # inflation.
  "-C", "link-arg=-zstack-size=8388608",
]
